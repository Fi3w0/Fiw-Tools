name: release

# Manual fallback — run from the Actions tab if the auto-publish in build.yml
# failed and you need to re-publish a specific tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build all targets
        run: ./gradlew build --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}

      - name: Collect loader jars
        run: |
          mkdir -p release
          find . -path '*/build/libs/*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-shadow.jar' \
            ! -name 'fiw-tools-core*.jar' -exec cp -v {} release/ \;
          echo "--- release contents ---"
          ls -la release

      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          awk -v ver="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ ("^## \\[" ver "\\]")) p=1 }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Fiw Tools $VERSION" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Read release notes for Modrinth
        id: relnotes
        run: |
          {
            echo 'content<<CHANGELOG_EOF'
            cat RELEASE_NOTES.md
            echo CHANGELOG_EOF
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

      - name: Publish to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CHANGELOG: ${{ steps.relnotes.outputs.content }}
        run: |
          printf '%s' "$CHANGELOG" > /tmp/changelog.txt

          publish() {
            local file="$1" game_ver="$2" loader="$3"
            python3 - "$VERSION" "$game_ver" "$loader" <<'PYEOF'
          import json, sys, pathlib
          ver, game_ver, loader = sys.argv[1], sys.argv[2], sys.argv[3]
          changelog = pathlib.Path('/tmp/changelog.txt').read_text()
          deps = [] if loader == 'neoforge' else [
            {'project_id': 'P7dR8mSH', 'dependency_type': 'required'},
            {'project_id': 'Ha28R6CL', 'dependency_type': 'required'},
          ]
          payload = json.dumps({
            'name': f'FIW Tools {ver}',
            'version_number': ver,
            'changelog': changelog,
            'dependencies': deps,
            'game_versions': [game_ver],
            'version_type': 'release',
            'loaders': [loader],
            'featured': False,
            'project_id': 'VHLQczbA',
            'file_parts': ['file']
          })
          pathlib.Path('/tmp/modrinth_data.json').write_text(payload)
          PYEOF
            curl -sf \
              -H "Authorization: $MODRINTH_TOKEN" \
              -F "data=</tmp/modrinth_data.json;type=application/json" \
              -F "file=@$file" \
              "https://api.modrinth.com/v2/version"
            echo " -> published $file ($loader $game_ver)"
          }
          publish "release/fiw-tools-fabric-1.21.11-${VERSION}.jar"   "1.21.11" "fabric"
          publish "release/fiw-tools-fabric-26.1.2-${VERSION}.jar"    "26.1.2"  "fabric"
          publish "release/fiw-tools-neoforge-1.21.11-${VERSION}.jar" "1.21.11" "neoforge"
