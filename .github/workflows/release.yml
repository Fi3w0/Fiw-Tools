name: release

# Tag a version (e.g. `git tag v1.1.0 && git push origin v1.1.0`) to build all
# targets and publish the jars as a GitHub Release automatically.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build all targets
        run: ./gradlew build --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}

      - name: Collect loader jars
        run: |
          mkdir -p release
          find . -path '*/build/libs/*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-shadow.jar' \
            ! -name 'fiw-tools-core-*.jar' -exec cp -v {} release/ \;
          echo "--- release contents ---"
          ls -la release

      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk -v ver="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ ("^## \\[" ver "\\]")) p=1 }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Fiw Tools $VERSION" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true
