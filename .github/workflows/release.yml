name: release

# Manual fallback — run from the Actions tab if the auto-publish in build.yml
# failed and you need to re-publish a specific tag.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v1.0.3)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 + 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Setup Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build all targets
        run: ./gradlew build --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_25_X64 }}

      - name: Collect loader jars
        run: |
          mkdir -p release
          find . -path '*/build/libs/*.jar' \
            ! -name '*-sources.jar' ! -name '*-dev.jar' ! -name '*-shadow.jar' \
            ! -name 'fiw-tools-core*.jar' -exec cp -v {} release/ \;
          echo "--- release contents ---"
          ls -la release

      - name: Extract changelog section for this tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          awk -v ver="$VERSION" '
            /^## \[/ { if (p) exit; if ($0 ~ ("^## \\[" ver "\\]")) p=1 }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Fiw Tools $VERSION" > RELEASE_NOTES.md
          fi
          echo "--- release notes ---"; cat RELEASE_NOTES.md

      - name: Read release notes for Modrinth
        id: relnotes
        run: |
          {
            echo 'content<<CHANGELOG_EOF'
            cat RELEASE_NOTES.md
            echo CHANGELOG_EOF
          } >> $GITHUB_OUTPUT

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.jar
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

      - name: Publish to Modrinth — Fabric 1.21.11
        uses: modrinth/minotaur@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: fiw-tools
          version_number: ${{ env.VERSION }}
          version_type: release
          upload_file: release/fiw-tools-fabric-1.21.11-${{ env.VERSION }}.jar
          game_versions: 1.21.11
          loaders: fabric
          changelog: ${{ steps.relnotes.outputs.content }}

      - name: Publish to Modrinth — Fabric 26.1.2
        uses: modrinth/minotaur@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: fiw-tools
          version_number: ${{ env.VERSION }}
          version_type: release
          upload_file: release/fiw-tools-fabric-26.1.2-${{ env.VERSION }}.jar
          game_versions: 26.1.2
          loaders: fabric
          changelog: ${{ steps.relnotes.outputs.content }}

      - name: Publish to Modrinth — NeoForge 1.21.11
        uses: modrinth/minotaur@v2
        with:
          token: ${{ secrets.MODRINTH_TOKEN }}
          project_id: fiw-tools
          version_number: ${{ env.VERSION }}
          version_type: release
          upload_file: release/fiw-tools-neoforge-1.21.11-${{ env.VERSION }}.jar
          game_versions: 1.21.11
          loaders: neoforge
          changelog: ${{ steps.relnotes.outputs.content }}
